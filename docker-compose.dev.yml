# Axionax Core Universe - Full Stack Development
# Runs blockchain core + web services together

version: '3.8'

services:
  # ============================================
  # 🦀 Blockchain Node (Primary)
  # ============================================
  axionax-node:
    build:
      context: ./core
      dockerfile: ../ops/deploy/Dockerfile
    container_name: axionax-node
    restart: unless-stopped
    ports:
      - "8545:8545"     # JSON-RPC HTTP
      - "8546:8546"     # JSON-RPC WebSocket
      - "30303:30303"   # P2P
      - "9100:9100"     # Prometheus metrics
    volumes:
      - node_data:/data
      - ./core/src:/app/src:ro
    environment:
      - RUST_LOG=info,axionax=debug
      - CHAIN_ID=86137
      - NETWORK=testnet
      - RPC_HOST=0.0.0.0
      - RPC_PORT=8545
      - WS_PORT=8546
      - P2P_PORT=30303
      - BLOCK_TIME=5
      - MAX_PEERS=50
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axionax-core

  # ============================================
  # 🦀 Second Validator Node
  # ============================================
  axionax-validator:
    build:
      context: ./core
      dockerfile: ../ops/deploy/Dockerfile
    container_name: axionax-validator
    restart: unless-stopped
    ports:
      - "8555:8545"     # JSON-RPC HTTP (different port)
      - "30304:30303"   # P2P
    volumes:
      - validator_data:/data
    environment:
      - RUST_LOG=info
      - CHAIN_ID=86137
      - NETWORK=testnet
      - BOOTNODES=enode://node@axionax-node:30303
      - VALIDATOR_MODE=true
    depends_on:
      - axionax-node
    networks:
      - axionax-core

  # ============================================
  # 🗄️ PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: axionax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axionax
      POSTGRES_PASSWORD: axionax_dev_2026
      POSTGRES_DB: axionax_testnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axionax -d axionax_testnet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axionax-core

  # ============================================
  # 📦 Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: axionax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - axionax-core

  # ============================================
  # 🌐 Web Interface (from web-universe)
  # ============================================
  web:
    build:
      context: ./web-universe/apps/web
      dockerfile: Dockerfile
    container_name: axionax-web
    restart: unless-stopped
    depends_on:
      - axionax-node
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=http://axionax-node:8545
      - NEXT_PUBLIC_WS_URL=ws://axionax-node:8546
      - NEXT_PUBLIC_CHAIN_ID=86137
      - NODE_ENV=development
    networks:
      - axionax-core

  # ============================================
  # 🛒 Marketplace (from web-universe)
  # ============================================
  marketplace:
    build:
      context: ./web-universe/apps/marketplace
      dockerfile: Dockerfile
    container_name: axionax-marketplace
    restart: unless-stopped
    depends_on:
      - axionax-node
    ports:
      - "5173:5173"
    environment:
      - VITE_RPC_URL=http://axionax-node:8545
      - VITE_CHAIN_ID=86137
    networks:
      - axionax-core

  # ============================================
  # 💧 Faucet API
  # ============================================
  faucet:
    build:
      context: ./tools/faucet
      dockerfile: Dockerfile
    container_name: axionax-faucet
    restart: unless-stopped
    depends_on:
      - axionax-node
      - redis
    ports:
      - "3002:3002"
    environment:
      - RPC_URL=http://axionax-node:8545
      - REDIS_URL=redis://redis:6379
      - FAUCET_AMOUNT=100
      - COOLDOWN_HOURS=24
    networks:
      - axionax-core

  # ============================================
  # 📊 Prometheus (Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: axionax-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./ops/deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - axionax-core

  # ============================================
  # 📈 Grafana (Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: axionax-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=axionax
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/deploy/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - axionax-core

  # ============================================
  # 🔍 Block Explorer Backend
  # ============================================
  explorer-api:
    build:
      context: ./tools/devtools
      dockerfile: Dockerfile.explorer
    container_name: axionax-explorer-api
    restart: unless-stopped
    depends_on:
      - axionax-node
      - postgres
    ports:
      - "3001:3001"
    environment:
      - RPC_URL=http://axionax-node:8545
      - DATABASE_URL=postgresql://axionax:axionax_dev_2026@postgres:5432/axionax_testnet
      - PORT=3001
    networks:
      - axionax-core

volumes:
  node_data:
  validator_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  axionax-core:
    name: axionax-core-network
    driver: bridge

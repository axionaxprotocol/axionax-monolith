# Axionax OS (Next.js) — monorepo root
#
# Do NOT point `publish` at `.next` as a static site without the Next.js runtime.
# That served raw build output and made the app look "blank" / 404.
# The @netlify/plugin-nextjs runtime wires SSR, functions, and routing correctly.

[build]
  command = "pnpm install && pnpm --filter axionax-os-dashboard build"
  publish = "apps/os-dashboard/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.32.1"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# RPC rate limiting: 30 req/sec per IP (burst allows short spikes)
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=30r/s;

# WebSocket connection limiting: 10 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# RPC Node - rpc.axionax.org
server {
    listen 80;
    server_name rpc.axionax.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name rpc.axionax.org;

    ssl_certificate /etc/letsencrypt/live/rpc.axionax.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.axionax.org/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Request size limit (prevent large payload attacks)
    client_max_body_size 1m;

    # HTTP RPC
    location / {
        limit_req zone=rpc_limit burst=50 nodelay;

        proxy_pass http://rpc-node:8545;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers — only allow *.axionax.org origins
        set $cors_origin "";
        if ($http_origin ~* "^https://([a-zA-Z0-9-]+\.)?axionax\.org$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # WebSocket
    location /ws {
        limit_conn ws_conn 10;

        proxy_pass http://rpc-node:8546;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
